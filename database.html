<!DOCTYPE html>
<html>
<head>
    <title>Technical Specifications</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { background: #0b0c0d; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .container { display: flex; flex: 1; width: 100%; }
        model-viewer { flex: 3; background: #111; width: 100%; height: 100%; }
        .lore-panel { flex: 1; background: #1a1c1e; padding: 30px; border-left: 2px solid #333; overflow-y: auto; }
        .back { color: #3498db; text-decoration: none; display: block; margin-bottom: 20px; font-weight: bold; }
        h1 { color: #3498db; border-bottom: 2px solid #3498db; }
        .stats { background: #25282c; padding: 15px; margin-top: 20px; font-family: monospace; font-size: 0.9rem; border-radius: 5px; }
    </style>
</head>
<body>

<model-viewer id="viewer" src="" auto-rotate camera-controls shadow-intensity="1" style="width: 100%; height: 100%;"></model-viewer>

<div class="lore-panel">
    <a href="index.html" class="back">← EXIT DATABASE</a>
    <h1 id="title">Loading...</h1>
    <p id="desc"></p>
    <div class="stats" id="stats"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const team = urlParams.get('team');
    const ship = urlParams.get('ship');

    const shipIntel = 
    {
        "arwing_mk1": 
        {
            name: "Arwing MK I",
            desc: "The original Arspace Dynamics interceptor. Fast and agile, but lacks heavy armor. A favorite among mercenaries for its reliable G-Diffuser system.",
        },

        "arwing_mk2": 
        {
            name: "Arwing MK II",
            desc: "A high-performance successor to the MK I. Cancelled by the Cornerian Army due to high costs, it is now a rare sight, used only by those with the credits to maintain its advanced systems.",
        },

        "arwing_mk2_b": 
        {
            name: "Arwing MK II Retrofit",
            desc: "A custom X-02b variant engineered by Slippy Toad. Despite superior internal modifications, the craft suffers from hardware degradation due to poor upkeep. High potential, but unpredictable performance.",
        },

        "arwing_mk3": 
        {
            name: "Arwing MK III",
            desc: "The pinnacle of Arspace Dynamics engineering. Built using data from the Phoenix project, it balances extreme durability with record-breaking speeds. Truly the ultimate evolution of the Star Fox fleet.",
        },

        "arwing_phoenix": 
        {
            name: "Arwing Phoenix",
            desc: "An experimental stunt-class Arwing variant. Known for its unique gliding capabilities and a specialized weapon system that fires concentrated plasma streams generated from engine heat.",
        },

        "landmaster": 
        {
            name: "Landmaster",
            desc: "A heavy-armored ground combat vehicle. Revived from a failed Arspace Dynamics project and upgraded by Slippy Toad, it features high-caliber firepower and a G-Diffuser for surprising agility on the battlefield.",
        },

        "bluemarine": 
        {
            name: "Bluemarine",
            desc: "A heavy assault submarine engineered for deep-sea combat. While lacking in speed, its reinforced hull and specialized Aquan weaponry make it the ultimate platform for oceanic operations.",
        },

        "miyu_arwing": 
        {
            name: "Miyu's Arwing",
            desc: "A lightweight post-war model optimized for speed. While it boasts superior maneuverability, its defensive capabilities are significantly reduced to maintain its high-thrust-to-weight ratio.",
        },

        "fay_arwing": 
        {
            name: "Fay's Arwing",
            
        },

        "skyclaw": 
        {
            name: "Arwing Skyclaw",
            desc: "Falco's specialized MK III. By removing standard armor, this craft achieves the highest thrust-to-weight ratio in the Star Fox fleet, allowing for unmatched aerial superiority in the hands of an ace.",
        },

        "cloudrunner": 
        {
            name: "Arwing Cloudrunner",
            desc: "Krystal's personalized MK III. This unit sacrifices the Arwing's signature maneuverability for superior defensive plating and devastating firepower, making it ideal for frontal assaults.",
        },

        "gf_64": 
        {
            name: "Great Fox 64",
            desc: "A Dreadnought-class Heavy Cruiser and the base of operations for Star Fox. Equipped with hyper-laser cannons and a built-in ROB-64 interface, it is as much a weapon as it is a home.",
        },

        "gf_adv": 
        {
            name: "Great Fox Adventures",
            
        },

        "gf_assault": 
        {
            name: "Great Fox Assault",
            
        },

        "wolfen": 
        {
        name: "Wolfen",
        desc: "A heavy-hitting interceptor designed by Ruffian Corp. Originally a Venom Navy staple, it became the signature craft of Star Wolf. It balances high offensive power with surprising agility.",
        },

         "redfang": 
        {
        name: "Redfang",

        },

         "rainbow": 
        {
        name: "Rainbow Delta",

        },

         "blackrose": 
        {
        name: "Blackrose",

        },

         "stalker": 
        {
        name: "Stalker",

        },
    };

    if (team && ship && shipIntel[ship]) 
    {
        // This combines them: "starfox/arwing_mk1.glb"
        document.getElementById('viewer').src = `${team}/${ship}.glb`;
        
        document.getElementById('title').innerText = shipIntel[ship].name;
        document.getElementById('desc').innerText = shipIntel[ship].desc;
        document.getElementById('stats').innerText = shipIntel[ship].stats;
    }
</script>

</body>
</html>
